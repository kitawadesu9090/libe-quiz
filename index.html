const {useState, useEffect, useRef} = React;

// ========== QUIZ DATA ==========
const QUIZ_LEVELS = {
  beginner: {
    label:"初級", emoji:"🌱", color:"#2ecc71",
    gradient:"linear-gradient(135deg, #43c46e 0%, #2e9e54 100%)", shadow:"rgba(105,240,174,0.5)",
    questions: [
      { question:'リベ大の「リベ」は何の略？', choices:["リベラルアーツ","リベンジ","リベラル","リベルタ"], correctIndex:0, explanation:"リベ大は「リベラルアーツ大学」の略！\n自由に生きるための教養を学ぶ場所です。" },
      { question:"リベ大の両学長のシンボルキャラクターは？", choices:["トラ","クマ","ゴリラ","ライオン"], correctIndex:3, explanation:"両学長のアイコンはマッチョなライオン！🦁\nYouTubeでおなじみですね。" },
      { question:"リベ大で教えている「お金にまつわる5つの力」に\n含まれないのはどれ？", choices:["貯める力","借りる力","稼ぐ力","増やす力"], correctIndex:1, explanation:"5つの力は「貯める・稼ぐ・増やす・守る・使う」！\n「借りる力」はありません。" },
      { question:"リベ大YouTube動画の冒頭の挨拶は？", choices:["おはようございます","こんにちは皆さん","やっほー","どうもー"], correctIndex:0, explanation:"毎朝の動画は「おはようございます！両学長です」\nから始まります！朝活の定番ですね。" },
      { question:"両学長が「お金持ちになるために\n最初に取り組むべき」と言っているのは？", choices:["高収入の仕事に転職する","固定費を見直して支出を減らす","すぐに株式投資を始める","副業で稼ぐ"], correctIndex:1, explanation:"まずは「固定費を減らす」こと！💡\n収入を増やすより先に出費を削るのが基本。\n保険・通信費・サブスクの見直しから始めましょう。" },
      { question:"リベ大が「固定費3大見直し」として\n挙げているものに含まれないのは？", choices:["民間保険","通信費（格安SIM）","電気・ガス会社","食費"], correctIndex:3, explanation:"食費は変動費なので「固定費」ではありません！\n固定費の代表は保険・通信費・電気ガス会社の見直し。\nここを削ると毎月ずっと節約効果が続きます。" },
      { question:"両学長が「お金を守る」上で\n最も避けるべきと警告しているのは？", choices:["ちょっとした贅沢","詐欺・ぼったくり商品","外食費","旅行代"], correctIndex:1, explanation:"詐欺・ぼったくり商品は絶対NG！🚨\n「絶対儲かる」「元本保証」など甘い言葉には要注意。\n守る力がなければ稼いだお金も一瞬でなくなります。" },
      { question:"リベ大で勧めている\n家計管理の第一歩は？", choices:["すぐに投資を始める","収入を増やす活動","支出を記録して現状を把握","節税から始める"], correctIndex:2, explanation:"まず「支出の把握」から！📊\n家計簿アプリ（マネーフォワードMEなど）で\n何にいくら使っているか見える化するのが第一歩です。" },
      { question:"リベ大が推奨する通信費の\n節約方法は？", choices:["Wi-Fiのみで生活","光回線を解約する","格安SIMに乗り換える","データ通信を制限する"], correctIndex:2, explanation:"格安SIMへの乗り換えが最強！📱\n大手キャリアから格安SIMに変えるだけで\n月数千円〜1万円以上の節約になる人も。\n固定費削減の定番テクニックです。" },
      { question:"新NISAで得た利益に\nかかる税金は？", choices:["約20%の税金がかかる","約10%の税金がかかる","申告すれば免除される","非課税（税金ゼロ）"], correctIndex:3, explanation:"新NISAの利益は完全非課税！🎉\n通常の投資では利益の約20%が税金でとられますが\n新NISA内なら税金ゼロ。\n長期投資で大きな差になります。" },
      { question:"リベ大でよく言われる\n「複利」の説明として正しいのは？", choices:["元本だけに利子がつく","借金が増える仕組み","利子がさらに利子を生む","株価が上がり続ける"], correctIndex:2, explanation:"複利は「利子に利子がつく」雪だるま式！⛄\n長期間運用するほど効果が大きくなります。\nアインシュタインも「人類最大の発明」と\n称したと言われる仕組みです。" },
      { question:"両学長が言う「お金の勉強を\n始めるベストなタイミング」は？", choices:["定年退職後","子供が生まれてから","20代のうち","今すぐ・何歳でも"], correctIndex:3, explanation:"今すぐが一番！⏰\n「お金の勉強に遅すぎることはない」\nというのが両学長のメッセージ。\n何歳からでもスタートできます。" },
      { question:"リベ大で紹介されている\n「ふるさと納税」のメリットは？", choices:["全額が戻ってくる","実質2,000円で特産品がもらえる","税金が半額になる","所得が非課税になる"], correctIndex:1, explanation:"実質2,000円負担で特産品ゲット！🎁\n寄附金の残りは税金から控除されるので\n実質自己負担はたった2,000円。\n「貯める力」の代表的な節税テクです。" },
      { question:"リベ大YouTube動画は\n主に何時に公開される？", choices:["朝6時","朝9時","昼12時","夜8時"], correctIndex:0, explanation:"毎朝6時に公開！🌅\n両学長は毎朝6時に動画を投稿しています。\n朝活の習慣として多くのリベ大生が\n朝イチで視聴しています。" },
      { question:"リベ大が「お金を増やす」前に\n必ず取り組むべきと言うことは？", choices:["株の勉強をする","投資口座を開設する","緊急予備費を確保する","副業を始める"], correctIndex:2, explanation:"まず緊急予備費（生活費3〜6ヶ月分）を確保！🛡️\nこれがないと急な出費で投資を\n取り崩す羽目になります。\n守りを固めてから攻める、が基本です。" },
      { question:"新NISAの2つの枠を合わせた\n年間最大投資額はいくら？", choices:["200万円","300万円","360万円","400万円"], correctIndex:2, explanation:"つみたて投資枠120万円＋成長投資枠240万円＝360万円！💡\n生涯投資枠は合計1,800万円です。" },
      { question:"生活防衛資金の保管に\n最も適した口座は？", choices:["株式投資口座","普通預金口座","定期預金口座","外貨預金"], correctIndex:1, explanation:"いつでも引き出せる普通預金が最適！🏦\n緊急時にすぐ使えることが大切なので\n流動性の高い口座に置いておきましょう。" },
      { question:"クレジットカードを\n賢く使う最大のメリットは？", choices:["利息が低い","ポイント還元","融資が簡単","税金の優遇"], correctIndex:1, explanation:"ポイント還元で実質的な節約ができる！💳\n1〜2%の還元率でも年間で見ると大きな差に。\nただし使いすぎには要注意です。" },
      { question:"ふるさと納税で税金の控除を\n受けるために必要なのは？", choices:["寄付だけで自動適用","確定申告またはワンストップ特例","市役所への届け出","銀行での手続き"], correctIndex:1, explanation:"確定申告かワンストップ特例の手続きが必須！📝\nワンストップ特例は5自治体以内なら\n確定申告不要で簡単に控除が受けられます。" },
      { question:"リベ大が推奨する\n「給与天引き貯蓄」の最大のメリットは？", choices:["税金が減る","手取りが増える","自動的に貯蓄できる","投資が必須になる"], correctIndex:2, explanation:"自動的にお金が貯まる仕組み！💪\n給料から天引きされるので「使う前に貯まる」。\n意志の力に頼らない仕組み化が成功のカギです。" },
      { question:"リベ大で紹介される\n「72の法則」とは？", choices:["72万円貯める法則","72÷利率＝資産が2倍になる年数","毎月72時間働く法則","72歳までに引退する法則"], correctIndex:1, explanation:"72÷年利＝お金が2倍になる年数！📐\n例：年利6%なら72÷6＝12年で2倍。\n複利の力を簡単に計算できる便利な法則です。" },
      { question:"リベ大が「絶対に入るべき」と\n言っている保険の種類は？", choices:["医療保険","がん保険","自動車保険（対人対物）","学資保険"], correctIndex:2, explanation:"自動車保険の対人対物は必須！🚗\n事故で相手に大ケガをさせると\n数千万〜億単位の賠償になることも。\n「低確率・大損失」に備えるのが保険の本質です。" },
      { question:"リベ大で「お金の大学」として\n出版された書籍の正式タイトルは？", choices:["お金の教科書","本当の自由を手に入れる\nお金の大学","リベ大式・お金の増やし方","両学長のマネー講座"], correctIndex:1, explanation:"「本当の自由を手に入れる お金の大学」！📕\n2020年発売のベストセラーで\n5つの力を体系的に学べる一冊です。" },
      { question:"リベ大が勧める\n「先取り貯蓄」の目安は\n手取りの何%？", choices:["5%","10%","20%","30%"], correctIndex:1, explanation:"まずは手取りの10%から！💰\n無理なく続けられる額からスタートして\n慣れてきたら徐々に増やすのがコツ。\n「収入−貯蓄＝支出」の順番が大切です。" },
      { question:"リベ大で学ぶ「使う力」とは\nどういう意味？", choices:["たくさん浪費すること","お金を有意義に使う力","投資にお金を回すこと","節約してお金を使わないこと"], correctIndex:1, explanation:"お金を「価値あること」に使う力！✨\n貯めるだけでなく、自分や大切な人のために\n満足度の高い使い方をすることが大切です。" },
      { question:"両学長が「サブスク」について\nよく言うアドバイスは？", choices:["全部解約すべき","年1回は見直すべき","月500円以下なら問題ない","3つ以内に絞るべき"], correctIndex:1, explanation:"サブスクは年1回は見直そう！📱\n「使っていないのに払い続けている」\nサブスクが意外と多いもの。\n固定費削減の基本テクニックです。" },
      { question:"リベ大が「貯める力」で\n電力会社の見直しを勧める理由は？", choices:["エコだから","品質が上がるから","年間数千〜数万円節約できるから","政府が推奨しているから"], correctIndex:2, explanation:"電力会社を乗り換えるだけで年間数千〜数万円の節約！⚡\n手続きも簡単で、電気の品質は変わりません。\nやらない理由がない固定費削減です。" },
      { question:"リベ大が「投資初心者が\n最初にやるべきこと」として\n挙げているのは？", choices:["個別株を買う","FXで練習する","証券口座を開設する","仮想通貨を少額買う"], correctIndex:2, explanation:"まずは証券口座の開設から！🏦\nネット証券（SBI証券・楽天証券など）で\n口座を作るのが第一歩。\n開設は無料で維持費もかかりません。" },
      { question:"リベ大が「やってはいけない節約」\nとして挙げているのは？", choices:["格安SIMへの乗り換え","食費を極端に削る","保険の見直し","電力会社の変更"], correctIndex:1, explanation:"食費を極端に削るのはNG！🍽️\n健康を害すると医療費がかかり本末転倒。\n「ストレスなく続けられる節約」が\nリベ大の基本方針です。" },
      { question:"両学長がよく使う\n「今日が人生で一番若い日」の\n意味は？", choices:["若さが大事","美容に気をつけよう","始めるなら今すぐ","運動しよう"], correctIndex:2, explanation:"何かを始めるなら今が一番早い！🌅\n「もう遅い」と思う必要はなく\n今日から行動すれば明日には1日分\n前に進んでいるという前向きなメッセージです。" },
    ],
  },
  intermediate: {
    label:"中級", emoji:"🔥", color:"#ff8c69",
    gradient:"linear-gradient(135deg, #e8925a 0%, #d4603e 100%)", shadow:"rgba(253,139,116,0.5)",
    questions: [
      { question:"リベ大で「5つの力」のうち、\n両学長が最初に鍛えるべきと言っている力は？", choices:["貯める力","稼ぐ力","増やす力","守る力"], correctIndex:0, explanation:"まずは「貯める力」から！💰\n固定費の見直しなど、誰でもすぐに取り組めて\n効果が大きいのがポイントです。" },
      { question:"リベ大で紹介されている「お金持ちの定義」として\n正しいのはどれ？", choices:["年収が1,000万円以上","資産が1億円以上","高級ブランドを持っている","生活費 ＜ 資産所得"], correctIndex:3, explanation:"生活費を資産所得が上回った状態が本当の自由！🏖️\n年収が高くても支出が多ければお金持ちとは言えません。" },
      { question:"両学長が「貯める力」で最優先で\n見直すべきと言っている固定費は？", choices:["食費","通信費（格安SIM）","民間保険","交際費"], correctIndex:2, explanation:"まずは民間保険の見直し！🏥\n公的保険で十分カバーできるケースが多く、\n不要な保険を解約するだけで大きな節約になります。" },
      { question:"両学長がおすすめしている\nインデックスファンドの投資手法は？", choices:["一括投資で短期売買","レバレッジをかけた集中投資","高配当株のみに全力投資","ドルコスト平均法で長期・分散"], correctIndex:3, explanation:"長期・分散・積立が基本！📈\nドルコスト平均法でコツコツ積み立てることで\nリスクを抑えながら資産形成できます。" },
      { question:"新NISAの「つみたて投資枠」の\n年間上限額はいくら？", choices:["120万円","40万円","80万円","240万円"], correctIndex:0, explanation:"つみたて投資枠は年間120万円！💰\n旧つみたてNISAの40万円から大幅アップ。\n成長投資枠240万円と合わせて年360万円まで非課税で投資できます。" },
      { question:"ふるさと納税の「実質自己負担額」はいくら？", choices:["0円","2,000円","5,000円","10,000円"], correctIndex:1, explanation:"実質負担はたった2,000円！🎁\nそれ以外の寄附金は税金から控除されるので\n実質2,000円で特産品がもらえるお得な制度です。" },

      { question:"新NISAの非課税で\n保有できる期間は？", choices:["最長5年","最長20年","最長30年","無期限"], correctIndex:3, explanation:"新NISAは無期限で非課税！⏳\n旧NISAは期間制限がありましたが\n新NISAでは売るまでずっと非課税のまま。\n長期投資との相性が抜群です。" },

      { question:"リベ大で「楽天経済圏」が\n節約に有効とされる主な理由は？", choices:["ポイントが日常生活で効率よく貯まる","楽天銀行の金利が高い","楽天カードが永年無料","楽天証券の取引手数料がゼロ"], correctIndex:0, explanation:"生活費をまとめて楽天ポイントをザクザク貯める！🛒\n楽天カード・楽天市場・楽天モバイルなどを\n組み合わせることで日々の支出で\nポイントを大量獲得できます。" },

const getDailyStreak = () => {
  try {
    const data = JSON.parse(localStorage.getItem("libe_daily") || "{}");
    return { streak: data.streak || 0, lastDate: data.lastDate || "", bestStreak: data.bestStreak || 0, todayDone: false };
  } catch(e) { return { streak: 0, lastDate: "", bestStreak: 0, todayDone: false }; }
};
const saveDailyResult = (score, total) => {
  try {
    const today = new Date();
    const todayStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,"0")}-${String(today.getDate()).padStart(2,"0")}`;
    const data = JSON.parse(localStorage.getItem("libe_daily") || "{}");
    const yesterday = new Date(today); yesterday.setDate(yesterday.getDate()-1);
    const yesterdayStr = `${yesterday.getFullYear()}-${String(yesterday.getMonth()+1).padStart(2,"0")}-${String(yesterday.getDate()).padStart(2,"0")}`;
    let streak = data.lastDate === yesterdayStr ? (data.streak || 0) + 1 : data.lastDate === todayStr ? (data.streak || 1) : 1;
    const bestStreak = Math.max(streak, data.bestStreak || 0);
    localStorage.setItem("libe_daily", JSON.stringify({ streak, lastDate: todayStr, bestStreak, lastScore: score, lastTotal: total }));
    return { streak, bestStreak };
  } catch(e) { return { streak: 1, bestStreak: 1 }; }
};
const isDailyDone = () => {
  try {
    const today = new Date();
    const todayStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,"0")}-${String(today.getDate()).padStart(2,"0")}`;
    const data = JSON.parse(localStorage.getItem("libe_daily") || "{}");
    return data.lastDate === todayStr;
  } catch(e) { return false; }
};

// ========== PARTICLES ==========
class Particle {
  constructor(x,y,color){this.x=x;this.y=y;this.vx=(Math.random()-0.5)*14;this.vy=(Math.random()-0.5)*14-5;this.life=1;this.decay=Math.random()*0.015+0.004;this.size=Math.random()*6+2;this.color=color;this.gravity=0.1;this.rotation=Math.random()*360;this.rotationSpeed=(Math.random()-0.5)*10;}
  update(){this.x+=this.vx;this.vy+=this.gravity;this.y+=this.vy;this.life-=this.decay;this.rotation+=this.rotationSpeed;}
  draw(ctx){ctx.save();ctx.translate(this.x,this.y);ctx.rotate(this.rotation*Math.PI/180);ctx.globalAlpha=Math.max(0,this.life);ctx.fillStyle=this.color;ctx.fillRect(-this.size/2,-this.size/2,this.size,this.size*2.5);ctx.restore();}
}
class Firework {
  constructor(x,y){this.particles=[];const c=["#FF6B9D","#C44DFF","#4ECDC4","#FFE66D","#FF8A5C","#A8E6CF","#FFDAC1","#B5EAD7","#FF9AA2","#FFB7B2"];for(let i=0;i<45;i++)this.particles.push(new Particle(x,y,c[Math.floor(Math.random()*c.length)]));}
  update(){this.particles.forEach(p=>p.update());this.particles=this.particles.filter(p=>p.life>0);}
  draw(ctx){this.particles.forEach(p=>p.draw(ctx));}
  get alive(){return this.particles.length>0;}
}
class FloatingShape {
  constructor(w,h){this.reset(w,h,true);}
  reset(w,h,init=false){this.x=Math.random()*w;this.y=init?Math.random()*h:h+30;this.size=Math.random()*20+8;this.speed=Math.random()*0.4+0.15;this.opacity=Math.random()*0.12+0.03;this.hue=Math.random()*360;this.shape=Math.floor(Math.random()*3);this.wobble=Math.random()*Math.PI*2;this.wobbleSpeed=Math.random()*0.02+0.005;}
  update(w,h){this.y-=this.speed;this.wobble+=this.wobbleSpeed;this.x+=Math.sin(this.wobble)*0.3;if(this.y<-40)this.reset(w,h);}
  draw(ctx){ctx.save();ctx.globalAlpha=this.opacity;ctx.fillStyle=`hsl(${this.hue},80%,75%)`;ctx.translate(this.x,this.y);if(this.shape===0){ctx.beginPath();ctx.arc(0,0,this.size,0,Math.PI*2);ctx.fill();}else if(this.shape===1){ctx.beginPath();for(let i=0;i<5;i++){const a=(i*4*Math.PI)/5-Math.PI/2;ctx[i===0?"moveTo":"lineTo"](Math.cos(a)*this.size,Math.sin(a)*this.size);}ctx.closePath();ctx.fill();}else{const s=this.size*0.6;ctx.beginPath();ctx.moveTo(0,s*0.3);ctx.bezierCurveTo(-s,-s*0.5,-s*0.5,-s*1.2,0,-s*0.5);ctx.bezierCurveTo(s*0.5,-s*1.2,s,-s*0.5,0,s*0.3);ctx.fill();}ctx.restore();}
}

          `https://api.allorigins.win/raw?url=${encodeURIComponent(rssUrl)}`,
          `https://corsproxy.io/?${encodeURIComponent(rssUrl)}`,
        ];

        for(const proxy of proxies){
          try{const res=await fetch(proxy,{signal:AbortSignal.timeout(8000)});if(res.ok){text=await res.text();break;}}catch(e){continue;}
        }
        if(!text)return false;

                    <p style={{color:"#2a1a30",fontSize:14,lineHeight:1.7,whiteSpace:"pre-line",margin:0}}>{questions[quizIndex].explanation}</p>
                    {gakuchoComment&&(
                      <div style={{marginTop:12,padding:"12px 14px",background:selectedAnswer===questions[quizIndex].correctIndex?"linear-gradient(135deg,#fff9e6,#fff0c8)":"linear-gradient(135deg,#fff0f0,#ffe8e8)",borderRadius:14,border:selectedAnswer===questions[quizIndex].correctIndex?"2px solid rgba(255,179,0,0.3)":"2px solid rgba(255,107,107,0.25)",display:"flex",gap:10,alignItems:"flex-start"}}>
                        <GakuchoAvatar size={48}/>
                        <div>
                          <p style={{color:"#c56200",fontSize:12,fontWeight:800,marginBottom:2,marginTop:0}}>学長のひとこと</p>
                          <p style={{color:"#2a1a30",fontSize:13,lineHeight:1.6,margin:0,fontWeight:600}}>{gakuchoComment}</p>
                        </div>
                      </div>
                    )}
                  </div>
                )}
              </>
            )}
            {!quizRevealed?(
              <button onClick={handleRevealNow} style={{width:"100%",padding:isJankenQ?"24px 18px":"18px",fontSize:isJankenQ?26:19,fontWeight:900,color:"#fff",textShadow:"0 3px 6px rgba(0,0,0,0.6), 0 1px 2px rgba(0,0,0,0.5)",background:isJankenQ?"linear-gradient(135deg,#ff6f00,#e65100,#bf360c)":levelInfo.gradient,border:isJankenQ?"4px solid rgba(255,255,255,0.4)":"none",borderRadius:50,cursor:"pointer",boxShadow:isJankenQ?(selectedAnswer!==null?"0 8px 30px rgba(230,81,0,0.7), 0 0 60px rgba(255,111,0,0.3)":"0 5px 18px rgba(230,81,0,0.45)"):`0 5px 18px ${levelInfo.shadow}`,minHeight:isJankenQ?80:58,animation:isJankenQ&&selectedAnswer!==null?"pulse 0.6s ease-in-out infinite":"none",letterSpacing:isJankenQ?3:0}}>{isJankenQ?(selectedAnswer!==null?"👊 じゃんけんぽん！！！":"✊✌️🖐️ 手を選んでね"):"答えを見る!"}</button>
            ):(
              <button onClick={handleNextQuestion} style={{width:"100%",padding:"15px",fontSize:18,fontWeight:800,color:"#fff",textShadow:"0 2px 4px rgba(0,0,0,0.5), 0 0px 1px rgba(0,0,0,0.4)",background:"linear-gradient(135deg,#e8569e,#e0724a)",border:"none",borderRadius:50,cursor:"pointer",boxShadow:"0 5px 20px rgba(255,110,180,0.45)"}}>{quizIndex+1<questions.length?"つぎの問題へ →":"結果を見る 🎉"}</button>
            )}
            <button onClick={handleBackToLevels} style={{width:"100%",padding:"10px",fontSize:13,fontWeight:600,color:"#6b3a5c",background:"rgba(255,255,255,0.65)",border:"2px solid rgba(255,110,180,0.2)",borderRadius:50,cursor:"pointer",marginTop:8}}>← 難易度選択にもどる</button>
          </div>
          );})()}

        {screen==="quiz_done"&&(()=>{
          const total=questions.filter(q=>!q.isJanken).length;
          const isPerfect=score===total;
          const confettiEmojis=["🎉","🏆","⭐","✨","🎊","💫","🌟","👑","💎","🦁"];
          return(
          <div style={{animation:"bounceIn 0.6s ease",position:"relative",overflow:"hidden"}}>
            {/* 紙吹雪アニメーション（全問正解時） */}
            {isPerfect&&(
              <div style={{position:"absolute",top:0,left:0,right:0,bottom:0,pointerEvents:"none",zIndex:10,overflow:"hidden"}}>
                {Array.from({length:20}).map((_,i)=>(
                  <div key={i} style={{position:"absolute",left:`${(i*17+7)%100}%`,top:"-10%",fontSize:Math.random()>0.5?28:20,animation:`confettiFall ${2.5+Math.random()*2}s linear ${Math.random()*1.5}s infinite`,opacity:0.9}}>{confettiEmojis[i%confettiEmojis.length]}</div>
                ))}
              </div>
            )}
            {isPerfect?(
              <>
                <div style={{fontSize:80,marginBottom:4,animation:"bounceIn 0.8s ease"}}>🏆</div>
                <h2 style={{fontSize:"1.8rem",fontWeight:900,marginBottom:6,background:"linear-gradient(135deg,#FFD700,#FFA500,#FF6347,#FFD700)",backgroundSize:"300% 300%",animation:"rainbowBg 3s ease infinite",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",letterSpacing:2}}>🎊 パーフェクト！！ 🎊</h2>
                <p style={{color:"#d63384",fontSize:16,fontWeight:800,marginBottom:12,textShadow:"0 1px 4px rgba(214,51,132,0.3)"}}>全問正解！すんばらしい！ 🦁</p>
              </>
            ):(
              <>
                <div style={{fontSize:56,marginBottom:8}}>🎉</div>
                <h2 style={{color:"#d63384",fontSize:"1.6rem",fontWeight:900,marginBottom:12}}>クイズ終了！ 🎊</h2>
              </>
            )}
            <div style={{background:isPerfect?"linear-gradient(135deg,#fffbe6,#fff9c4,#fff0c8)":"#ffffff",borderRadius:28,padding:"28px 32px",boxShadow:isPerfect?"0 8px 40px rgba(255,179,0,0.4), 0 0 60px rgba(255,215,0,0.15)":"0 8px 30px rgba(255,110,180,0.2)",border:isPerfect?"3px solid rgba(255,179,0,0.5)":"2px solid rgba(255,110,180,0.2)",maxWidth:380,margin:"0 auto",animation:isPerfect?"perfectPulse 2s ease-in-out infinite":"none",position:"relative",zIndex:5}}>
              <span style={{display:"inline-block",background:levelInfo.gradient,padding:"4px 16px",borderRadius:50,fontSize:13,fontWeight:700,color:"#fff",textShadow:"0 1px 3px rgba(0,0,0,0.4)",marginBottom:14}}>{levelInfo.emoji} {levelInfo.label}</span>
              <div style={{fontSize:isPerfect?72:64,fontWeight:900,marginBottom:8,background:isPerfect?"linear-gradient(135deg,#FFD700,#FF8C00,#FF6347)":"linear-gradient(135deg,#ff6eb4,#ffb347)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>{score} / {total}</div>
              {isPerfect?(
                <div style={{background:"linear-gradient(135deg,#FFD700,#FFA500)",borderRadius:50,padding:"8px 24px",display:"inline-block",marginBottom:14,boxShadow:"0 4px 16px rgba(255,165,0,0.4)"}}>
                  <span style={{fontSize:18,fontWeight:900,color:"#fff",textShadow:"0 2px 4px rgba(0,0,0,0.3)",letterSpacing:1}}>👑 PERFECT 👑</span>
                </div>
              ):(
                <p style={{color:"#6b3a5c",fontSize:16,marginBottom:12,fontWeight:700}}>{score>=total*0.5?"よくがんばりました！ 👏":"つぎはリベンジ！ 💪"}</p>
              )}
              <div style={{padding:"14px 16px",background:isPerfect?"linear-gradient(135deg,#fff9e6,#fff0c8)":score>=total*0.5?"linear-gradient(135deg,#f0fff4,#e8f8f0)":"linear-gradient(135deg,#fff0f5,#ffe8f0)",borderRadius:16,border:isPerfect?"2px solid rgba(255,179,0,0.3)":score>=total*0.5?"2px solid rgba(0,184,148,0.25)":"2px solid rgba(255,110,180,0.25)",marginBottom:16,textAlign:"left",display:"flex",gap:10,alignItems:"flex-start"}}>
                <GakuchoAvatar size={56}/>
                <div>
                  <p style={{color:"#c56200",fontSize:12,fontWeight:800,marginBottom:3,marginTop:0}}>学長からのメッセージ</p>
                  <p style={{color:"#2a1a30",fontSize:14,lineHeight:1.7,margin:0,fontWeight:600}}>{gakuchoResultComment}</p>
                </div>
              </div>
              {difficulty==="daily"&&(
                <div style={{background:"linear-gradient(135deg,#fff3e0,#ffe0b2)",borderRadius:14,padding:"12px 16px",marginBottom:14,border:"2px solid rgba(255,152,0,0.3)",textAlign:"center"}}>
                  <p style={{fontSize:24,margin:"0 0 4px",fontWeight:900}}>🔥 {dailyStreak.streak}日連続チャレンジ！</p>
                  {dailyStreak.bestStreak>0&&<p style={{color:"#e65100",fontSize:12,fontWeight:700,margin:0}}>🏆 最高記録: {dailyStreak.bestStreak}日連続</p>}
                </div>
              )}
              <button onClick={handleBackToLevels} style={{width:"100%",padding:"14px",fontSize:16,fontWeight:800,color:"#fff",textShadow:"0 2px 4px rgba(0,0,0,0.5), 0 0px 1px rgba(0,0,0,0.4)",background:isPerfect?"linear-gradient(135deg,#FFD700,#FF8C00)":"linear-gradient(135deg,#e8569e,#e0724a)",border:"none",borderRadius:50,cursor:"pointer",boxShadow:isPerfect?"0 5px 20px rgba(255,140,0,0.5)":"0 5px 20px rgba(255,110,180,0.45)",marginBottom:8}}>もういちど遊ぶ 🔄</button>
              <button onClick={handleBackToMenu} style={{width:"100%",padding:"12px",fontSize:14,fontWeight:600,color:"#6b3a5c",background:"rgba(255,110,180,0.08)",border:"2px solid rgba(255,110,180,0.2)",borderRadius:50,cursor:"pointer"}}>メニューにもどる</button>
            </div>
          </div>
          );})()}

        {/* 編集画面 */}
        {screen==="edit_fan"&&(
          <div style={{animation:"fadeIn 0.3s ease"}}>
            <div style={{fontSize:36,marginBottom:4}}>✏️</div>
            <h2 style={{color:"#d63384",fontSize:"1.3rem",fontWeight:900,marginBottom:4}}>今日のライブ問題を編集 ✏️</h2>
            <p style={{color:"#6b3a5c",fontSize:12,marginBottom:10}}>毎日のライブ内容に合わせて問題を変えよう！</p>
            <button onClick={fetchYoutubeLive} disabled={fetchStatus==="loading"} style={{width:"100%",maxWidth:340,margin:"0 auto 12px",padding:"11px",fontSize:14,fontWeight:700,color:"#fff",textShadow:"0 2px 4px rgba(0,0,0,0.5), 0 0px 1px rgba(0,0,0,0.4)",background:fetchStatus==="loading"?"#b2bec3":"linear-gradient(135deg,#ff6b6b,#ee5a24)",border:"none",borderRadius:50,cursor:fetchStatus==="loading"?"wait":"pointer",boxShadow:"0 4px 14px rgba(238,90,36,0.3)",display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
              {fetchStatus==="loading"?"📡 取得中...":"📺 YouTubeから今日のライブを取得"}
            </button>
            {fetchStatus==="done"&&<p style={{color:"#00b894",fontSize:12,fontWeight:700,marginBottom:6}}>✅ ライブ情報を取得しました！内容を確認して保存してください</p>}
            {fetchStatus==="error"&&<p style={{color:"#ff6b6b",fontSize:12,fontWeight:700,marginBottom:6}}>⚠️ 取得できませんでした。手動で入力してください</p>}
            <div style={{display:"flex",gap:6,justifyContent:"center",marginBottom:14,flexWrap:"wrap"}}>
              {editingQuestions.map((_,i)=>(
                <button key={i} onClick={()=>setEditIndex(i)} style={{padding:"7px 14px",fontSize:13,fontWeight:700,borderRadius:50,border:editIndex===i?"2.5px solid #f39c12":"2px solid rgba(0,0,0,0.08)",background:editIndex===i?"rgba(243,156,18,0.2)":"rgba(255,255,255,0.7)",color:editIndex===i?"#e67e22":"#636e72",cursor:"pointer"}}>Q{i+1}</button>
              ))}
              {editingQuestions.length<8&&(<button onClick={handleAddQuestion} style={{padding:"7px 12px",fontSize:16,fontWeight:700,borderRadius:50,border:"2px dashed rgba(0,0,0,0.15)",background:"rgba(255,255,255,0.5)",color:"#3d4852",cursor:"pointer"}}>+</button>)}
            </div>
            {editingQuestions[editIndex]&&(
              <div style={{background:"#ffffff",borderRadius:22,padding:"16px",textAlign:"left",boxShadow:"0 4px 20px rgba(255,110,180,0.15)",border:"2px solid rgba(255,110,180,0.2)"}}>
                <label style={{display:"block",fontSize:12,fontWeight:700,color:"#6b3a5c",marginBottom:4}}>📝 問題文</label>
                <textarea value={editingQuestions[editIndex].question} onChange={e=>handleEditField(editIndex,"question",e.target.value)} style={{width:"100%",minHeight:55,padding:8,fontSize:14,borderRadius:10,border:"2px solid rgba(0,0,0,0.08)",resize:"vertical",fontFamily:"inherit",boxSizing:"border-box"}} placeholder="問題を入力…"/>
                <label style={{display:"block",fontSize:12,fontWeight:700,color:"#6b3a5c",marginTop:10,marginBottom:4}}>🔤 選択肢（4つ）</label>
                {editingQuestions[editIndex].choices.map((c,ci)=>(
                  <div key={ci} style={{display:"flex",alignItems:"center",gap:5,marginBottom:5}}>
                    <span style={{display:"inline-flex",alignItems:"center",justifyContent:"center",width:26,height:26,borderRadius:50,fontSize:12,fontWeight:800,flexShrink:0,background:editingQuestions[editIndex].correctIndex===ci?"#00b894":"#dfe6e9",color:editingQuestions[editIndex].correctIndex===ci?"#fff":"#636e72"}}>{"ABCDE"[ci]}</span>
                    <input value={c} onChange={e=>handleEditField(editIndex,"choice_"+ci,e.target.value)} style={{flex:1,padding:7,fontSize:13,borderRadius:8,border:"2px solid rgba(0,0,0,0.08)",fontFamily:"inherit"}} placeholder={"選択肢"+"ABCDE"[ci]}/>
                    <button onClick={()=>handleEditField(editIndex,"correctIndex",ci)} style={{padding:"3px 8px",fontSize:12,fontWeight:700,borderRadius:50,cursor:"pointer",border:"none",background:editingQuestions[editIndex].correctIndex===ci?"#00b894":"#dfe6e9",color:editingQuestions[editIndex].correctIndex===ci?"#fff":"#636e72",whiteSpace:"nowrap"}}>{editingQuestions[editIndex].correctIndex===ci?"正解 ✓":"正解にする"}</button>
                  </div>
                ))}
                <label style={{display:"block",fontSize:12,fontWeight:700,color:"#3d4852",marginTop:10,marginBottom:4}}>💡 解説</label>
                <textarea value={editingQuestions[editIndex].explanation} onChange={e=>handleEditField(editIndex,"explanation",e.target.value)} style={{width:"100%",minHeight:45,padding:8,fontSize:13,borderRadius:10,border:"2px solid rgba(0,0,0,0.08)",resize:"vertical",fontFamily:"inherit",boxSizing:"border-box"}} placeholder="解説を入力…"/>
                {editingQuestions.length>1&&(<button onClick={()=>handleDeleteQuestion(editIndex)} style={{marginTop:8,padding:"5px 14px",fontSize:12,fontWeight:600,color:"#ff6b6b",background:"rgba(255,107,107,0.1)",border:"1.5px solid rgba(255,107,107,0.3)",borderRadius:50,cursor:"pointer"}}>この問題を削除</button>)}
              </div>
            )}
            <div style={{display:"flex",gap:10,marginTop:16,justifyContent:"center"}}>
              <button onClick={handleSaveEdit} style={{flex:1,maxWidth:180,padding:"13px",fontSize:16,fontWeight:700,color:"#fff",textShadow:"0 2px 4px rgba(0,0,0,0.5), 0 0px 1px rgba(0,0,0,0.4)",background:"linear-gradient(135deg,#f1c40f,#e67e22)",border:"none",borderRadius:50,cursor:"pointer",boxShadow:"0 5px 15px rgba(243,156,18,0.35)"}}>保存する 💾</button>
              <button onClick={()=>setScreen("level_select")} style={{flex:1,maxWidth:180,padding:"13px",fontSize:14,fontWeight:600,color:"#3d4852",background:"rgba(255,255,255,0.6)",border:"none",borderRadius:50,cursor:"pointer"}}>キャンセル</button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
