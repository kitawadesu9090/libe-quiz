<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>公開停止中</title>
<meta name="robots" content="noindex, nofollow">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, 'Hiragino Sans', sans-serif;
    background: #F7F8FB;
    color: #384860;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .card {
    background: #FFFFFF;
    border-radius: 16px;
    padding: 40px 28px;
    max-width: 400px;
    box-shadow: 0 2px 8px rgba(56,72,96,0.08);
    text-align: center;
  }
  h1 {
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 12px;
    color: #384860;
  }
  p {
    font-size: 14px;
    color: #5A6B82;
    line-height: 1.7;
  }
  .icon {
    font-size: 40px;
    margin-bottom: 16px;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="icon">🔒</div>
    <h1>このサイトは公開を停止しています</h1>
    <p>ご覧いただきありがとうございます。<br>現在このサイトは非公開です。</p>
  </div>
</body>
</html>
