name: Daily Quiz Update

# Runs every morning at 09:00 JST (00:00 UTC) and can be triggered manually.
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-quiz-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install 'youtube-transcript-api>=0.6.2'

      - name: Generate quiz data
        id: generate
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python scripts/generate_quiz.py
          echo "generated_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Show generated file
        run: |
          echo "=== quiz-data.json ==="
          cat quiz-data.json

      - name: Commit and push if changed
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add quiz-data.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          DATE_JST=$(TZ=Asia/Tokyo date +%Y-%m-%d)
          git commit -m "Daily quiz update: ${DATE_JST}"
          git push
